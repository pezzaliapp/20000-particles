<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
<title>20000 Particles</title>
<meta name="description" content="An interactive sphere of 20,000 glowing particles that reacts to your music, your voice and your photos." />
<meta name="theme-color" content="#000000" />
<link rel="manifest" href="./manifest.json" />
<link rel="icon" href="./icons/icon-192.png" />
<link rel="apple-touch-icon" href="./icons/icon-192.png" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="20000 Particles" />
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    height: 100%;
    background: #000;
    overflow: hidden;
    font-family: 'SF Mono', 'JetBrains Mono', ui-monospace, Menlo, Consolas, monospace;
    -webkit-user-select: none;
    user-select: none;
  }
  #stage { position: fixed; inset: 0; }
  #stage canvas { display: block; touch-action: none; }

  header {
    position: fixed;
    top: 0; left: 0; right: 0;
    padding: calc(16px + env(safe-area-inset-top)) 22px 0;
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    pointer-events: none;
    z-index: 2;
  }
  .title { color: #e8e2d6; font-size: 15px; font-weight: 600; letter-spacing: 0.02em; }
  .sub { color: #5c5c5c; font-size: 11px; margin-top: 4px; display: flex; align-items: center; gap: 8px; }
  .sub .live { color: #f5c97a; }
  .hint { color: #5c5c5c; font-size: 11px; text-align: right; line-height: 1.5; }

  #vu {
    width: 46px; height: 4px;
    border-radius: 2px;
    background: #1c1c1c;
    overflow: hidden;
    display: none;
  }
  #vu.on { display: block; }
  #vuFill {
    height: 100%; width: 0%;
    background: linear-gradient(90deg, #f5c97a, #ff6a21);
    border-radius: 2px;
    transition: width 60ms linear;
  }

  nav {
    position: fixed;
    bottom: calc(20px + env(safe-area-inset-bottom));
    left: 0; right: 0;
    display: flex;
    justify-content: center;
    flex-wrap: wrap;
    gap: 10px;
    padding: 0 16px;
    z-index: 2;
  }
  button.mode {
    padding: 9px 16px;
    border-radius: 999px;
    border: 1px solid #3a3a3a;
    background: rgba(0,0,0,0.4);
    color: #8a8a8a;
    font-size: 12px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    cursor: pointer;
    transition: all .25s ease;
    font-family: inherit;
    -webkit-tap-highlight-color: transparent;
  }
  button.mode.active {
    border-color: #f5c97a;
    background: rgba(245,201,122,0.12);
    color: #f5c97a;
  }
  button.mode:focus-visible { outline: 2px solid #f5c97a; outline-offset: 2px; }
  #fileInput, #imageInput { display: none; }
</style>
</head>
<body>
<div id="stage"></div>

<header>
  <div>
    <div class="title">20000 Particles</div>
    <div class="sub">
      <span id="sourceLabel">count = 20000 &middot; THREE.Points</span>
      <span id="vu"><span id="vuFill"></span></span>
    </div>
  </div>
  <div class="hint">drag to rotate<br/>touch to heat</div>
</header>

<nav>
  <button class="mode active" id="btnCalm">Calm</button>
  <button class="mode" id="btnSwarm">Swarm</button>
  <button class="mode" id="btnPhoto">&#128247; Photo</button>
  <button class="mode" id="btnMic">&#127908; Mic</button>
  <button class="mode" id="btnTrack">&#9835; Track</button>
  <button class="mode" id="btnDemo">&#9658; Demo</button>
</nav>
<input type="file" id="fileInput" accept="audio/*" />
<input type="file" id="imageInput" accept="image/*" />

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
(function () {
  const mount = document.getElementById('stage');
  const reduceMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  const isSmall = Math.min(window.innerWidth, window.innerHeight) < 700;
  const COUNT = isSmall ? 9000 : 20000;
  const RADIUS = 1;

  // ============ SCENE ============
  const scene = new THREE.Scene();
  scene.background = new THREE.Color(0x000000);
  const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 10);
  camera.position.z = 2.7;

  const renderer = new THREE.WebGLRenderer({ antialias: false });
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.setSize(window.innerWidth, window.innerHeight);
  mount.appendChild(renderer.domElement);

  const cnv = document.createElement('canvas');
  cnv.width = cnv.height = 64;
  const ctx = cnv.getContext('2d');
  const grad = ctx.createRadialGradient(32, 32, 0, 32, 32, 32);
  grad.addColorStop(0, 'rgba(255,255,255,1)');
  grad.addColorStop(0.3, 'rgba(255,255,255,0.6)');
  grad.addColorStop(1, 'rgba(255,255,255,0)');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, 64, 64);
  const sprite = new THREE.CanvasTexture(cnv);

  // Fibonacci sphere; each particle owns a frequency band by latitude
  const dirs = new Float32Array(COUNT * 3);
  const phase = new Float32Array(COUNT);
  const freq = new Float32Array(COUNT);
  const band = new Uint8Array(COUNT);
  const BANDS = 48;
  const GA = Math.PI * (3 - Math.sqrt(5));
  for (let i = 0; i < COUNT; i++) {
    const y = 1 - (i / (COUNT - 1)) * 2;
    const r = Math.sqrt(1 - y * y);
    const th = GA * i;
    dirs[i * 3] = Math.cos(th) * r;
    dirs[i * 3 + 1] = y;
    dirs[i * 3 + 2] = Math.sin(th) * r;
    phase[i] = Math.random() * Math.PI * 2;
    freq[i] = 0.6 + Math.random() * 1.6;
    band[i] = Math.min(BANDS - 1, Math.floor(Math.abs(y) * BANDS));
  }

  const positions = new Float32Array(COUNT * 3);
  const colors = new Float32Array(COUNT * 3);
  const geometry = new THREE.BufferGeometry();
  geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
  geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));

  const material = new THREE.PointsMaterial({
    size: isSmall ? 0.016 : 0.013,
    map: sprite,
    vertexColors: true,
    transparent: true,
    depthWrite: false,
    blending: THREE.AdditiveBlending
  });

  const group = new THREE.Group();
  group.add(new THREE.Points(geometry, material));
  scene.add(group);

  const calm = new THREE.Color(1.0, 0.86, 0.58);
  const hotA = new THREE.Color(1.0, 0.42, 0.13);
  const hotB = new THREE.Color(1.0, 0.72, 0.35);

  // ============ PHOTO SKIN ============
  // The photo wraps the sphere like a planet texture: every particle
  // samples the pixel under its own spherical coordinates. It works WITH
  // Calm and Swarm — the globe of your photo breathes, burns, dances.
  const imgCol = new Float32Array(COUNT * 3); // pixel color per particle
  const imgRel = new Float32Array(COUNT);     // luminance relief per particle
  let hasImage = false;
  let photoOn = false;
  let photoSkin = 0;       // smoothed 0..1
  let photoReveal = 0;     // sparkle-dissolve sweep on load

  async function loadImageFile(file) {
    let bmp;
    try {
      bmp = await createImageBitmap(file, { imageOrientation: 'from-image' });
    } catch (e) {
      bmp = await new Promise((res, rej) => {
        const im = new Image();
        im.onload = () => res(im);
        im.onerror = rej;
        im.src = URL.createObjectURL(file);
      });
    }
    // sample buffer: cover-crop to square so the photo wraps undistorted
    const S = 320;
    const sc = document.createElement('canvas');
    sc.width = S; sc.height = S;
    const sctx = sc.getContext('2d', { willReadFrequently: true });
    const side = Math.min(bmp.width, bmp.height);
    sctx.drawImage(
      bmp,
      (bmp.width - side) / 2, (bmp.height - side) / 2, side, side,
      0, 0, S, S
    );
    const data = sctx.getImageData(0, 0, S, S).data;
    if (bmp.close) bmp.close();

    // auto-contrast: stretch the luminance histogram (clip 2% tails)
    const hist = new Uint32Array(256);
    for (let p = 0; p < data.length; p += 4) {
      const l = (data[p] * 54 + data[p + 1] * 183 + data[p + 2] * 19) >> 8;
      hist[l]++;
    }
    const total = S * S, clip = total * 0.02;
    let lo = 0, hiV = 255, acc = 0;
    for (let l = 0; l < 256; l++) { acc += hist[l]; if (acc > clip) { lo = l; break; } }
    acc = 0;
    for (let l = 255; l >= 0; l--) { acc += hist[l]; if (acc > clip) { hiV = l; break; } }
    const range = Math.max(30, hiV - lo) / 255;
    const loN = lo / 255;

    // additive blending eats midtones: stretch, gamma-lift, boost
    const GAMMA = 0.65, BOOST = 1.35, FLOOR = 0.04;
    function px(v) {
      let c = (v / 255 - loN) / range;
      c = Math.max(0, Math.min(1, c));
      return Math.min(1, Math.pow(c, GAMMA) * BOOST + FLOOR);
    }

    // equirectangular mapping: longitude -> u, latitude -> v.
    // The photo appears on the front and wraps around the back mirrored,
    // so there is no ugly seam while the globe rotates.
    for (let i = 0; i < COUNT; i++) {
      const ix = i * 3;
      const dx = dirs[ix], dy = dirs[ix + 1], dz = dirs[ix + 2];
      let lon = Math.atan2(dx, dz) / Math.PI;     // -1..1, 0 = front center
      let u = Math.abs(lon);                       // mirror wrap, seamless
      let v = Math.acos(Math.max(-1, Math.min(1, dy))) / Math.PI; // 0 top
      const sx = Math.min(S - 1, (u * (S - 1)) | 0);
      const sy = Math.min(S - 1, (v * (S - 1)) | 0);
      const p4 = (sy * S + sx) * 4;
      const r = data[p4] / 255, g = data[p4 + 1] / 255, b = data[p4 + 2] / 255;
      const lum = 0.2126 * r + 0.7152 * g + 0.0722 * b;
      imgCol[ix] = px(data[p4]);
      imgCol[ix + 1] = px(data[p4 + 1]);
      imgCol[ix + 2] = px(data[p4 + 2]);
      imgRel[i] = (lum - 0.5); // -0.5..0.5 relief
    }
    hasImage = true;
  }

  // ============ POINTER ============
  const raycaster = new THREE.Raycaster();
  const ndc = new THREE.Vector2(10, 10);
  const hitSphere = new THREE.Sphere(new THREE.Vector3(0, 0, 0), RADIUS);
  const hitPoint = new THREE.Vector3();
  const localHit = new THREE.Vector3();
  const tmp = new THREE.Vector3();
  const inv = new THREE.Matrix4();
  let hasHit = false;
  let touchHeat = 0;
  let dragging = false, lastX = 0, lastY = 0, velX = 0, velY = 0;

  function toNDC(e) {
    ndc.x = (e.clientX / window.innerWidth) * 2 - 1;
    ndc.y = -(e.clientY / window.innerHeight) * 2 + 1;
  }
  renderer.domElement.addEventListener('pointerdown', (e) => {
    dragging = true; lastX = e.clientX; lastY = e.clientY;
    toNDC(e); touchHeat = 1;
  });
  renderer.domElement.addEventListener('pointermove', (e) => {
    toNDC(e);
    if (dragging) {
      velY = (e.clientX - lastX) * 0.005;
      velX = (e.clientY - lastY) * 0.005;
      lastX = e.clientX; lastY = e.clientY;
      touchHeat = Math.min(1, touchHeat + 0.1);
    }
  });
  window.addEventListener('pointerup', () => { dragging = false; });
  renderer.domElement.addEventListener('pointerleave', () => {
    dragging = false; ndc.set(10, 10);
  });
  window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
  });

  // ============ AUDIO ============
  let audioCtx = null, analyser = null, outGain = null;
  let fftData = null, waveData = null;
  let micStream = null, micSource = null;
  let audioEl = null, trackSource = null;
  let audioMode = 'none';
  const spectrum = new Float32Array(BANDS);
  let level = 0, bass = 0, highs = 0;
  let bassAvg = 0.02, beat = 0;
  let autoGain = 1, runningMax = 0.08;

  const sourceLabel = document.getElementById('sourceLabel');
  const vu = document.getElementById('vu');
  const vuFill = document.getElementById('vuFill');
  const btnCalm = document.getElementById('btnCalm');
  const btnSwarm = document.getElementById('btnSwarm');
  const btnPhoto = document.getElementById('btnPhoto');
  const btnMic = document.getElementById('btnMic');
  const btnTrack = document.getElementById('btnTrack');
  const btnDemo = document.getElementById('btnDemo');
  const fileInput = document.getElementById('fileInput');
  const imageInput = document.getElementById('imageInput');

  function ensureCtx() {
    if (!audioCtx) {
      const AC = window.AudioContext || window.webkitAudioContext;
      audioCtx = new AC();
      analyser = audioCtx.createAnalyser();
      analyser.fftSize = 1024;
      analyser.smoothingTimeConstant = 0.7;
      fftData = new Uint8Array(analyser.frequencyBinCount);
      waveData = new Uint8Array(analyser.fftSize);
      outGain = audioCtx.createGain();
      outGain.gain.value = 0;
      analyser.connect(outGain);
      outGain.connect(audioCtx.destination);
    }
    if (audioCtx.state === 'suspended') audioCtx.resume();
    return Promise.resolve();
  }

  function setLabel(html) { sourceLabel.innerHTML = html; }

  function stopMic() {
    if (micStream) { micStream.getTracks().forEach((t) => t.stop()); micStream = null; }
    if (micSource) { try { micSource.disconnect(); } catch (e) {} micSource = null; }
  }
  function deactivateAudio() {
    stopMic();
    if (audioEl) audioEl.pause();
    if (outGain) outGain.gain.value = 0;
    audioMode = 'none';
    runningMax = 0.08;
    btnMic.classList.remove('active');
    btnTrack.classList.remove('active');
    btnDemo.classList.remove('active');
    vu.classList.remove('on');
    setLabel('count = 20000 &middot; THREE.Points');
  }

  btnMic.addEventListener('click', async () => {
    if (audioMode === 'mic') { deactivateAudio(); return; }
    if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
      setLabel('mic not available in this browser');
      return;
    }
    try {
      await ensureCtx();
      if (audioEl) audioEl.pause();
      btnTrack.classList.remove('active');
      btnDemo.classList.remove('active');
      micStream = await navigator.mediaDevices.getUserMedia({ audio: true });
      micSource = audioCtx.createMediaStreamSource(micStream);
      micSource.connect(analyser);
      outGain.gain.value = 0;
      audioMode = 'mic';
      runningMax = 0.05;
      btnMic.classList.add('active');
      vu.classList.add('on');
      setLabel('<span class="live">&#9679; live</span> &middot; listening');
    } catch (err) {
      setLabel('mic blocked &middot; allow it in browser settings');
    }
  });

  let trackName = '';
  let isDemo = false;
  btnTrack.addEventListener('click', async () => {
    if (audioMode === 'track' && audioEl && !isDemo) {
      if (audioEl.paused) {
        await ensureCtx();
        audioEl.play().catch(() => {});
        setLabel('<span class="live">&#9654;</span> ' + trackName);
      } else {
        audioEl.pause();
        setLabel('&#10074;&#10074; paused &middot; tap Track to resume');
      }
      return;
    }
    fileInput.click();
  });

  fileInput.addEventListener('change', async () => {
    const file = fileInput.files[0];
    if (!file) return;
    await ensureCtx();
    stopMic();
    btnMic.classList.remove('active');
    if (!audioEl) {
      audioEl = new Audio();
      audioEl.loop = true;
      trackSource = audioCtx.createMediaElementSource(audioEl);
      trackSource.connect(analyser);
    }
    if (audioEl.src && audioEl.src.startsWith('blob:')) URL.revokeObjectURL(audioEl.src);
    audioEl.src = URL.createObjectURL(file);
    outGain.gain.value = 1;
    audioEl.play().catch(() => { setLabel('tap Track to start playback'); });
    audioMode = 'track';
    isDemo = false;
    btnDemo.classList.remove('active');
    runningMax = 0.15;
    trackName = file.name.length > 26 ? file.name.slice(0, 23) + '…' : file.name;
    btnTrack.classList.add('active');
    vu.classList.add('on');
    setLabel('<span class="live">&#9654;</span> ' + trackName);
    fileInput.value = '';
  });

  // --- Demo: bundled track (original music by the app author) ---
  const DEMO_URL = './demo/stay-in-the-loop.mp3';
  const DEMO_NAME = 'stay in the loop (demo)';
  btnDemo.addEventListener('click', async () => {
    if (audioMode === 'track' && isDemo && audioEl) {
      if (audioEl.paused) {
        await ensureCtx();
        audioEl.play().catch(() => {});
        setLabel('<span class="live">&#9654;</span> ' + DEMO_NAME);
      } else {
        audioEl.pause();
        setLabel('&#10074;&#10074; paused &middot; tap Demo to resume');
      }
      return;
    }
    await ensureCtx();
    stopMic();
    btnMic.classList.remove('active');
    if (!audioEl) {
      audioEl = new Audio();
      audioEl.loop = true;
      trackSource = audioCtx.createMediaElementSource(audioEl);
      trackSource.connect(analyser);
    }
    if (audioEl.src && audioEl.src.startsWith('blob:')) URL.revokeObjectURL(audioEl.src);
    audioEl.src = DEMO_URL;
    outGain.gain.value = 1;
    audioEl.play().catch(() => { setLabel('tap Demo to start playback'); });
    audioMode = 'track';
    isDemo = true;
    runningMax = 0.15;
    trackName = DEMO_NAME;
    btnDemo.classList.add('active');
    btnTrack.classList.remove('active');
    vu.classList.add('on');
    setLabel('<span class="live">&#9654;</span> ' + DEMO_NAME);
  });

  // --- Photo button ---
  // No image yet: tap opens the picker.
  // Image loaded: tap toggles the photo skin on/off (Calm & Swarm keep working).
  // Double-tap: pick a different image.
  let lastPhotoTap = 0;
  btnPhoto.addEventListener('click', () => {
    const now = performance.now();
    const isDouble = now - lastPhotoTap < 350;
    lastPhotoTap = now;
    if (!hasImage || isDouble) {
      imageInput.click();
      return;
    }
    photoOn = !photoOn;
    btnPhoto.classList.toggle('active', photoOn);
    if (photoOn) photoReveal = 0; // restart the sparkle dissolve
  });
  imageInput.addEventListener('change', async () => {
    const file = imageInput.files[0];
    if (!file) return;
    setLabel('decomposing image…');
    try {
      await loadImageFile(file);
      photoOn = true;
      photoReveal = 0;
      btnPhoto.classList.add('active');
      setLabel('photo skin &middot; double-tap &#128247; to change');
    } catch (e) {
      setLabel('could not read that image');
    }
    imageInput.value = '';
  });

  function updateAudio() {
    if (audioMode === 'none' || !analyser) {
      level *= 0.95; bass *= 0.95; highs *= 0.95; beat *= 0.9;
      for (let b = 0; b < BANDS; b++) spectrum[b] *= 0.93;
      return;
    }
    analyser.getByteFrequencyData(fftData);
    analyser.getByteTimeDomainData(waveData);

    let rms = 0;
    for (let i = 0; i < waveData.length; i += 4) {
      const v = (waveData[i] - 128) / 128;
      rms += v * v;
    }
    rms = Math.sqrt(rms / (waveData.length / 4));

    runningMax = Math.max(runningMax * 0.997, rms, 0.02);
    autoGain = 1 / runningMax;
    const lvl = Math.min(1, rms * autoGain);
    level += (lvl - level) * 0.25;

    const bins = fftData.length;
    const useful = Math.floor(bins * 0.55);
    const fGain = Math.min(6, autoGain * 0.9);

    for (let b = 0; b < BANDS; b++) {
      const i0 = Math.floor((b / BANDS) * useful);
      const i1 = Math.max(i0 + 1, Math.floor(((b + 1) / BANDS) * useful));
      let s = 0;
      for (let i = i0; i < i1; i++) s += fftData[i];
      let v = (s / ((i1 - i0) * 255)) * fGain;
      v = Math.min(1, v * v * 1.6);
      spectrum[b] += (v - spectrum[b]) * 0.35;
    }

    let bs = 0;
    for (let i = 1; i < 16; i++) bs += fftData[i];
    bs = Math.min(1, (bs / (15 * 255)) * fGain);
    bass += (bs - bass) * 0.3;

    let hs = 0;
    for (let i = 120; i < 320; i++) hs += fftData[i];
    hs = Math.min(1, (hs / (200 * 255)) * fGain * 1.5);
    highs += (hs - highs) * 0.25;

    bassAvg += (bs - bassAvg) * 0.02;
    if (bs > bassAvg * 1.4 && bs > 0.25 && beat < 0.3) beat = 1;
    beat *= 0.88;

    vuFill.style.width = Math.round(level * 100) + '%';
  }

  // ============ MODES ============
  let modeTarget = 0; // 0 = Calm, 1 = Swarm — both work with the photo skin
  function setMode(m) {
    modeTarget = m;
    btnCalm.classList.toggle('active', m === 0);
    btnSwarm.classList.toggle('active', m === 1);
  }
  btnCalm.addEventListener('click', () => setMode(0));
  btnSwarm.addEventListener('click', () => setMode(1));

  // ============ LOOP ============
  let agitation = 0;
  const driftSpeed = reduceMotion ? 0 : 0.0012;

  function animate(now) {
    const t = now * 0.001;

    updateAudio();

    agitation += (modeTarget - agitation) * 0.04;
    photoSkin += ((photoOn ? 1 : 0) - photoSkin) * 0.045;
    if (photoReveal < 1) photoReveal = Math.min(1, photoReveal + 0.012);
    touchHeat *= 0.96;

    const audioResp = 0.35 + 0.65 * agitation;
    const audioEnergy = (audioMode !== 'none')
      ? Math.min(1, (level * 1.6 + beat * 0.5) * audioResp)
      : 0;
    const energy = Math.min(1, agitation * 0.85 + touchHeat * 0.6 + audioEnergy);

    group.rotation.y += driftSpeed * (1 + audioEnergy * 4) + velY;
    group.rotation.x += velX;
    velX *= 0.92; velY *= 0.92;

    hasHit = false;
    if (ndc.x < 5) {
      raycaster.setFromCamera(ndc, camera);
      if (raycaster.ray.intersectSphere(hitSphere, hitPoint)) {
        inv.copy(group.matrixWorld).invert();
        localHit.copy(hitPoint).applyMatrix4(inv);
        hasHit = true;
      }
    }

    const jitterAmp = 0.05 * energy;
    const breathe = 1 + 0.012 * Math.sin(t * 1.4)
      + bass * 0.12 * audioResp
      + beat * 0.07 * audioResp;
    const specAmp = (0.16 + 0.26 * agitation) + beat * 0.12 * agitation;
    const heatResp = 0.35 + 0.65 * agitation;
    // the photo relief pumps with the bass and softens in full swarm
    const reliefAmp = photoSkin * (0.10 + bass * 0.18) * (1 - agitation * 0.4);
    const photoBeatLum = 1 + (beat * 0.5 + level * 0.25) * (audioMode !== 'none' ? 1 : 0);

    // bigger points when the photo skin is on: more light, more detail
    const baseSize = isSmall ? 0.016 : 0.013;
    material.size = baseSize * (1 + photoSkin * 0.75);

    for (let i = 0; i < COUNT; i++) {
      const ix = i * 3;
      const dx = dirs[ix], dy = dirs[ix + 1], dz = dirs[ix + 2];

      const n = Math.sin(t * 2.0 * freq[i] + phase[i]);
      let r = RADIUS * breathe + n * jitterAmp;
      const sv = spectrum[band[i]];
      r += sv * specAmp * (0.5 + 0.5 * Math.sin(phase[i] + t * 3));
      r += imgRel[i] * reliefAmp; // the photo gains real depth

      let heat = 0;
      if (hasHit) {
        tmp.set(dx, dy, dz);
        const d = tmp.distanceTo(localHit);
        if (d < 0.55) {
          const f = (1 - d / 0.55) * (1 - d / 0.55);
          r += f * 0.28 * (0.4 + touchHeat);
          heat = f;
        }
      }

      positions[ix] = dx * r;
      positions[ix + 1] = dy * r;
      positions[ix + 2] = dz * r;

      // --- procedural color (gold / orange) ---
      const local = Math.min(1, Math.abs(n) * energy * 1.4 + heat + sv * 1.2 * heatResp);
      const mixHot = Math.min(1, Math.max(energy * 0.85, local) + beat * 0.3 * heatResp);
      const flick = 0.5 + 0.5 * Math.sin(t * (3 + highs * 14) * freq[i] + phase[i] * 2);
      let cr = calm.r + (hotA.r + (hotB.r - hotA.r) * flick - calm.r) * mixHot;
      let cg = calm.g + (hotA.g + (hotB.g - hotA.g) * flick - calm.g) * mixHot;
      let cb = calm.b + (hotA.b + (hotB.b - hotA.b) * flick - calm.b) * mixHot;
      const lum = (0.6 + 0.4 * (0.4 + 0.6 * flick) * (0.5 + 0.5 * mixHot))
        * (1 + beat * 0.35 * audioResp);
      cr *= lum; cg *= lum; cb *= lum;

      // --- photo skin: per-particle sparkle dissolve, then live shimmer ---
      // each particle joins the picture at its own moment (phase-staggered)
      let s = photoSkin;
      if (photoSkin > 0.001 && photoReveal < 1) {
        const stagger = phase[i] / (Math.PI * 2); // 0..1
        s *= Math.max(0, Math.min(1, (photoReveal * 1.6 - stagger) * 2.5));
      }
      if (s > 0.001) {
        // in Swarm the photo burns: pixels lean toward the hot palette
        const burn = agitation * Math.min(1, mixHot + sv) * 0.45;
        const shimmer = (0.95 + 0.12 * flick) * photoBeatLum + heat * 1.1;
        const pr = (imgCol[ix] * (1 - burn) + cr * burn) * shimmer;
        const pg = (imgCol[ix + 1] * (1 - burn) + cg * burn) * shimmer;
        const pb = (imgCol[ix + 2] * (1 - burn) + cb * burn) * shimmer;
        cr = cr * (1 - s) + pr * s;
        cg = cg * (1 - s) + pg * s;
        cb = cb * (1 - s) + pb * s;
      }

      colors[ix] = cr;
      colors[ix + 1] = cg;
      colors[ix + 2] = cb;
    }

    geometry.attributes.position.needsUpdate = true;
    geometry.attributes.color.needsUpdate = true;
    renderer.render(scene, camera);
    requestAnimationFrame(animate);
  }
  requestAnimationFrame(animate);

  // ============ PWA ============
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('./sw.js').catch(() => {});
    });
  }
})();
</script>
</body>
